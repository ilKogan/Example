<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
	<title>ExampleGame</title>
	<meta name="game-version" content="0.1.1">
	<style>
		html, body, #canvas {
			margin: 0;
			padding: 0;
			border: 0;
		}

		body {
			color: #e8e8e8;
			background-color: #14141f;
			overflow: hidden;
			touch-action: none;
			font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
		}

		#canvas {
			display: block;
		}

		#canvas:focus {
			outline: none;
		}

		#status {
			position: absolute;
			inset: 0;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			gap: 1rem;
			background: linear-gradient(160deg, #14141f 0%, #1e1e2e 100%);
			visibility: hidden;
		}

		#status-title {
			font-size: clamp(1.5rem, 4vw, 2.5rem);
			font-weight: 700;
			margin: 0;
			text-align: center;
		}

		#status-version {
			font-size: 1rem;
			opacity: 0.7;
			margin: 0;
		}

		#status-progress {
			width: min(320px, 70vw);
			height: 8px;
			accent-color: #478cbf;
		}

		#status-notice {
			display: none;
			max-width: 640px;
			padding: 1rem 1.25rem;
			border-radius: 8px;
			background: #5b3943;
			border: 1px solid #9b3943;
			text-align: center;
			white-space: pre-wrap;
		}
	</style>
	<link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>

</head>
<body>
	<canvas id="canvas">
		Your browser does not support the canvas tag.
	</canvas>

	<div id="status">
		<h1 id="status-title">ExampleGame</h1>
		<p id="status-version">v0.1.1</p>
		<progress id="status-progress" value="0" max="100"></progress>
		<div id="status-notice"></div>
	</div>

	<script src="index.js"></script>
	<script>
		const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":false,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":5464,"index.wasm":37700666},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
		const GODOT_THREADS_ENABLED = false;
		const engine = new Engine(GODOT_CONFIG);

		(function () {
			const statusOverlay = document.getElementById('status');
			const statusProgress = document.getElementById('status-progress');
			const statusNotice = document.getElementById('status-notice');

			let initializing = true;
			let statusMode = '';

			function setStatusMode(mode) {
				if (statusMode === mode || !initializing) {
					return;
				}
				if (mode === 'hidden') {
					statusOverlay.remove();
					initializing = false;
					return;
				}
				statusOverlay.style.visibility = 'visible';
				statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
				statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
				statusMode = mode;
			}

			function setStatusNotice(text) {
				statusNotice.textContent = text;
			}

			function displayFailureNotice(err) {
				console.error(err);
				if (err instanceof Error) {
					setStatusNotice(err.message);
				} else if (typeof err === 'string') {
					setStatusNotice(err);
				} else {
					setStatusNotice('An unknown error occurred.');
				}
				setStatusMode('notice');
				initializing = false;
			}

			const missing = Engine.getMissingFeatures({
				threads: GODOT_THREADS_ENABLED,
			});

			if (missing.length !== 0) {
				const missingMsg = 'Missing browser features:\n' + missing.join('\n');
				displayFailureNotice(missingMsg);
			} else {
				setStatusMode('progress');
				engine.startGame({
					onProgress: function (current, total) {
						if (current > 0 && total > 0) {
							statusProgress.value = (current / total) * 100;
						}
					},
				}).then(function () {
					setStatusMode('hidden');
				}, displayFailureNotice);
			}
		}());
	</script>
</body>
</html>
